name: build

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - v*

jobs:

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      id-token: write
    steps:

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: ./.github/actions/version
        id: version

      - name: set version
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SANITIZED: ${{ steps.version.outputs.sanitized }}
        run: |
          envsubst < src/version.ts > src/version.ts.replaced
          mv src/version.ts.replaced src/version.ts
          npm version "$SANITIZED" --no-git-tag-version

      - name: dependencies
        shell: bash
        run: npm ci --omit=dev

      - name: build dev
        if: steps.version.outputs.release != 'true'
        shell: bash
        run: npm run build -- --project tsconfig.dev.json

      - name: build release
        if: steps.version.outputs.release == 'true'
        shell: bash
        run: npm run build

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: publish
        shell: bash
        env:
          TAG: ${{ case(steps.version.outputs.release == 'true', 'latest', 'snapshot') }}
        run: |
          cp package.json dist/
          cd dist
          npm publish --tag $TAG
